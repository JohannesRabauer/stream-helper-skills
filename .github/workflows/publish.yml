name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches the release tag
        if: github.event_name == 'release'
        run: |
          pkg_version="v$(node -p "require('./package.json').version")"
          tag_name="${{ github.event.release.tag_name }}"
          if [ "$pkg_version" != "$tag_name" ]; then
            echo "package.json version ($pkg_version) does not match release tag ($tag_name)."
            echo "Bump the version in package.json to match before publishing."
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
